<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo - Smart Cooking</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        p { font-weight: bold; margin-bottom: 5px; }
        
        input { 
            width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; margin-bottom: 15px;
        }

        .button-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-find { padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-clear { padding: 12px; background: #f1f3f4; color: #5f6368; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }

        .result-box { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 12px; border: 2px solid #e8eaed; display: none; text-align: center; }
        
        /* 料理名のスタイル：大きく目立たせる */
        #r-name { font-size: 24px; margin: 0 0 10px 0; color: #1a73e8; }
        
        /* コピーボタンのスタイル */
        .btn-copy { 
            display: inline-block; padding: 8px 16px; background: #fff; color: #1a73e8; 
            border: 1px solid #1a73e8; border-radius: 20px; font-size: 12px; 
            font-weight: bold; cursor: pointer; margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-copy:active { background: #e8f0fe; transform: scale(0.95); }

        #r-desc { font-size: 15px; color: #5f6368; margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .ad-space { margin-top: 20px; font-size: 13px; }
        .ad-space a { color: #1a73e8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Fridge Combo</h1>
    <p>What's in your fridge?</p>
    
    <input type="text" id="ingredients" placeholder="e.g., Beef, Onion, Tomato">
    
    <div class="button-group">
        <button class="btn-find" onclick="findRecipes()">Find Recipes</button>
        <button class="btn-clear" onclick="clearAll()">Clear Input</button>
    </div>

    <div id="result" class="result-box">
        <h2 id="r-name"></h2>
        
        <button class="btn-copy" onclick="copyRecipeName()">📋 Copy Name</button>
        
        <p id="r-desc"></p>
        
        <div class="ad-space">
            <a href="#" id="affiliate-link" target="_blank">Get professional kitchen tools here</a>
        </div>
    </div>

    <script>
        const recipes = [
            { name: "Herb Poached Chicken", needs: ["chicken", "thyme"], plus: "Olive Oil" },
            { name: "Garlic Basil Pasta", needs: ["pasta", "garlic"], plus: "Fresh Basil" },
            { name: "Zucchini Salsa Noodles", needs: ["zucchini", "tomato"], plus: "Olive Oil" },
            { name: "Eggplant & Beef Stir-fry", needs: ["eggplant", "beef"], plus: "Soy Sauce" }
        ];

        function findRecipes() {
            const input = document.getElementById('ingredients').value.toLowerCase();
            const resultDiv = document.getElementById('result');
            
            // 入力が空なら何もしない
            if (!input.trim()) return;

            const match = recipes.find(r => r.needs.some(n => input.includes(n)));

            if (match) {
                document.getElementById('r-name').innerText = match.name; 
                document.getElementById('r-desc').innerText = "If you have those, adding [" + match.plus + "] makes it perfect!";
                resultDiv.style.display = 'block';
                // 結果が出たらボタンまでスクロール
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("No recipe found! Try other ingredients.");
            }
        }

        function copyRecipeName() {
            const text = document.getElementById('r-name').innerText;
            // モダンなブラウザ用コピー機能
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.querySelector('.btn-copy');
                    btn.innerText = "✅ Copied!";
                    setTimeout(() => { btn.innerText = "📋 Copy Name"; }, 2000);
                });
            } else {
                alert("Sorry, your browser doesn't support direct copy.");
            }
        }

        function clearAll() {
            document.getElementById('ingredients').value = "";
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
