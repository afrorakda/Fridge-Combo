<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo | 献立ガチャ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fffaf0; display: flex; justify-content: center; padding: 20px; margin: 0; color: #444; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #d35400; font-size: 1.8rem; margin: 20px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 30px; }
        
        /* 入力ボックス */
        .input-box { width: 100%; padding: 18px; border: 3px solid #f39c12; border-radius: 50px; box-sizing: border-box; font-size: 18px; margin-bottom: 20px; outline: none; text-align: center; box-shadow: 0 4px 0 #e67e22; }

        /* メインボタン */
        .btn-main { width: 100%; padding: 18px; background-color: #f39c12; color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d35400; margin-bottom: 20px; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #d35400; }

        /* 結果エリア */
        #result-area { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .recipe-item { background: white; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; color: #2c3e50; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: fadeIn 0.3s ease; }

        /* シャッフルボタン（最初は隠しておく） */
        #shuffle-btn { width: 100%; padding: 12px; background-color: #34495e; color: white; border: none; border-radius: 12px; font-size: 14px; cursor: pointer; margin-top: 15px; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">その材料から、今夜のヒントを提案</p>

    <input type="text" id="ingredient-input" class="input-box" placeholder="例：beef" onkeypress="if(event.key==='Enter') findRecipes()">
    
    <button class="btn-main" onclick="findRecipes()">献立をひらめく！</button>

    <div id="result-area"></div>
    <button id="shuffle-btn" onclick="displayResults()">他のアイデアを見る (Shuffle)</button>
</div>

<script>
    let menuPool = [];
    let currentMatches = [];

    // 起動時に menu.json を読み込む
    window.onload = async () => {
        try {
            const response = await fetch('menu.json');
            menuPool = await response.json();
        } catch (e) { console.error("Menu Pool Error"); }
    };

    function findRecipes() {
        const input = document.getElementById('ingredient-input').value.toLowerCase().trim();
        if (!input) return;

        // 入力された材料が「含まれている」レシピを抽出
        currentMatches = menuPool.filter(recipe => 
            recipe.ingredients.some(ing => ing.includes(input))
        );

        displayResults();
    }

    function displayResults() {
        const output = document.getElementById('result-area');
        const shuffleBtn = document.getElementById('shuffle-btn');
        
        if (currentMatches.length === 0) {
            output.innerHTML = '<div style="color:#999">その材料のヒントはまだないみたい。</div>';
            shuffleBtn.style.display = 'none';
            return;
        }

        // シャッフル（配列をランダムに並び替え）
        const shuffled = [...currentMatches].sort(() => 0.5 - Math.random());
        // 先頭3つを取り出す
        const pickup = shuffled.slice(0, 3);

        output.innerHTML = pickup.map(r => `<div class="recipe-item">✨ ${r.name}</div>`).join('');
        
        // 候補が3つ以上ある場合のみシャッフルボタンを表示
        shuffleBtn.style.display = currentMatches.length > 3 ? 'block' : 'none';
    }
</script>

</body>
</html>
