<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; }
        .container { width: 100%; max-width: 380px; min-height: 90vh; display: flex; flex-direction: column; }
        
        h1 { font-size: 1.5rem; font-weight: 800; margin: 20px 0 5px; }
        .subtitle { font-size: 0.8rem; color: #666; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-clear { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; display: none; }

        .btn-main { width: 100%; padding: 16px; background-color: #111; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 25px; }

        #result-area { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .card { background: #f9f9f9; padding: 18px; border-radius: 10px; border: 1px solid #eee; }
        .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; display: block; cursor: pointer; }
        .tags { display: flex; gap: 6px; margin-bottom: 12px; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; background: #ddd; font-weight: bold; }
        .tag-vibe { background: #111; color: #fff; }
        .amazon { font-size: 0.7rem; color: #0066c0; text-decoration: none; }

        #shuffle { background: none; border: none; text-decoration: underline; font-size: 0.85rem; cursor: pointer; display: none; margin: 20px auto; font-weight: 600; }

        footer { margin-top: 40px; padding: 20px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.7rem; color: #aaa; line-height: 1.6; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">Just one ingredient for a dinner idea.</p>

    <div class="input-group">
        <input type="text" id="in" class="input-box" placeholder="e.g. beef" oninput="document.getElementById('cl').style.display=this.value?'block':'none'">
        <button id="cl" class="btn-clear" onclick="document.getElementById('in').value='';this.style.display='none'">✕</button>
    </div>
    
    <button class="btn-main" onclick="find()">Inspire Me</button>

    <div id="result-area"></div>
    <button id="shuffle" onclick="show()">Next Ideas →</button>

    <footer>
        No login / No tracking / Browser only<br>
        Fridge Combo © 2026
    </footer>
</div>

<div id="toast">Copied!</div>

<script>
    let pool = [], matches = [];
    window.onload = async () => { try { pool = await (await fetch('menu.json')).json(); } catch(e){} };

    function find() {
        const val = document.getElementById('in').value.toLowerCase().trim();
        if(!val) return;
        // ingredients不要とのことなので、nameにキーワードが含まれるか、または内部検索用に簡略化
        // （もし過去のingredientsデータを残すなら、ここだけは残しておくと検索が正確になります）
        matches = pool.filter(r => r.name.toLowerCase().includes(val));
        show();
    }

    function show() {
        const out = document.getElementById('result-area');
        const shf = document.getElementById('shuffle');
        if(!matches.length) { out.innerHTML = '<p style="text-align:center;color:#999">No ideas found.</p>'; return; }
        
        const res = [...matches].sort(()=>0.5-Math.random()).slice(0,3);
        out.innerHTML = res.map(r => `
            <div class="card">
                <span class="name" onclick="copy('${r.name}')">${r.name}</span>
                <div class="tags"><span class="tag">${r.time}</span><span class="tag tag-vibe">${r.vibe}</span></div>
                <a href="https://www.amazon.com/s?k=${r.name}+kit" target="_blank" class="amazon">🛒 Shop on Amazon</a>
            </div>
        `).join('');
        shf.style.display = matches.length > 3 ? 'block' : 'none';
    }

    async function copy(t) {
        await navigator.clipboard.writeText(t);
        const s = document.getElementById('toast');
        s.style.display='block'; setTimeout(()=>s.style.display='none', 1500);
    }
</script>

</body>
</html>
