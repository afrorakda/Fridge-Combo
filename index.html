<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Fridge Combo</title>
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/111/fff?text=FC">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 380px; min-height: 98vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 25px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 35px; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-box { width: 100%; padding: 18px 50px 18px 18px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; -webkit-appearance: none; }
        .input-box:focus { border-color: #111; }
        .btn-clear { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 22px; color: #ccc; cursor: pointer; display: none; }
        .btn-main { width: 100%; padding: 18px; background-color: #111; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 30px; transition: 0.2s; -webkit-appearance: none; }
        .btn-main:active { opacity: 0.8; transform: scale(0.98); }
        #result-area { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #f9f9f9; padding: 22px; border-radius: 14px; border: 1px solid #eee; animation: fadeIn 0.4s ease; position: relative; }
        .card-lazy { background: #111; color: #fff; border: none; }
        .name { font-size: 1.2rem; font-weight: 700; display: block; margin-bottom: 12px; cursor: pointer; }
        .tag-group { display: flex; gap: 6px; margin-bottom: 18px; }
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; background: #e0e0e0; color: #444; font-weight: 700; }
        .tag-vibe { background: #111; color: #fff; }
        .card-lazy .tag { background: #333; color: #ccc; }
        .amazon-link { font-size: 0.75rem; color: #0066c0; text-decoration: none; border-top: 1px solid #eee; padding-top: 15px; width: 100%; display: block; }
        .card-lazy .amazon-link { color: #aaa; border-top-color: #333; }
        #shuffle-btn { background: none; border: none; color: #111; font-size: 0.95rem; cursor: pointer; margin: 35px auto; text-decoration: underline; display: none; width: 100%; text-align: center; font-weight: 700; }
        footer { margin-top: 60px; padding: 30px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.75rem; color: #aaa; line-height: 1.8; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.8rem; display: none; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">Just one (or more) ingredient for tonight's dinner idea.</p>
    <div class="input-group">
        <input type="text" id="in" class="input-box" placeholder="beef, onion" onkeypress="if(event.key==='Enter') find()" oninput="toggleCl()">
        <button id="cl" class="btn-clear" onclick="clearAll()">✕</button>
    </div>
    <button id="btn" class="btn-main" onclick="find()">Inspire Me</button>
    <div id="result-area"></div>
    <button id="shuffle-btn" onclick="display()">Next Ideas →</button>
    <footer>
        No login / No tracking / Browser only<br>
        Fridge Combo © 2026
    </footer>
</div>
<div id="toast">Copied!</div>

<script>
    let pool = [], matches = [];
    const LAZY_WORDS = ['lazy', 'tired', 'exhausted', 'chill', 'no energy', '疲れた', 'ダメだ'];
    const ROBO_MSG = [
        "Go to a local Diner. You deserve a break. 🍔",
        "Chinese Takeout is calling your name... 🥡",
        "Netflix and Cereal. No cooking tonight. 🥣",
        "Just sleep. Dinner is overrated. 💤",
        "Pizza Delivery. Don't even think about a pan. 🍕"
    ];

    window.onload = async () => {
        try { pool = await (await fetch('menu.json')).json(); } catch(e) {}
        
        // 演出：3秒後にそっと "lazy?" を足す
        setTimeout(() => {
            const input = document.getElementById('in');
            if(!input.value) input.placeholder = "beef, onion, lazy?";
        }, 3000);
    };

    function toggleCl() {
        const input = document.getElementById('in');
        document.getElementById('cl').style.display = input.value ? 'block' : 'none';
        
        // 演出：lazyと打つとボタンが励ましてくる
        const btn = document.getElementById('btn');
        if(LAZY_WORDS.some(w => input.value.toLowerCase().includes(w))) {
            btn.innerText = "I'll help you...";
        } else {
            btn.innerText = "Inspire Me";
        }
    }

    function clearAll() {
        document.getElementById('in').value = '';
        document.getElementById('result-area').innerHTML = '';
        document.getElementById('shuffle-btn').style.display = 'none';
        toggleCl();
    }

    function find() {
        const val = document.getElementById('in').value.toLowerCase().trim();
        if(!val) return;

        // 深夜1時〜5時の愛の鞭
        const hour = new Date().getHours();
        const isLate = (hour >= 1 && hour < 5);

        const keywords = val.replace(/,/g, ' ').split(/\s+/).filter(item => item !== "");
        const hasLazy = keywords.some(k => LAZY_WORDS.includes(k)) || isLate;

        if (hasLazy) {
            // お疲れモード：外食1つ ＋ 10分以内メニュー2つ
            const quickOnes = pool.filter(r => parseInt(r.time) <= 10).sort(() => 0.5 - Math.random());
            const msg = isLate ? "It's " + hour + " AM. Why are you cooking? Go to sleep. 💤" : ROBO_MSG[Math.floor(Math.random()*ROBO_MSG.length)];
            
            matches = [
                { name: msg, time: "0 MIN", vibe: "EAT OUT", isSpecial: true },
                quickOnes[0], quickOnes[1]
            ];
        } else {
            // 通常検索：名前とタグの両方から探す
            matches = pool.filter(r => keywords.some(k => r.name.toLowerCase().includes(k) || (r.tags && r.tags.toLowerCase().includes(k))));
        }
        display();
    }

    function display() {
        const out = document.getElementById('result-area');
        const shf = document.getElementById('shuffle-btn');
        
        if(matches.length === 0) {
            const snarky = ["Your fridge is an empty abyss. 🥚", "Even a chef couldn't help with that. 👨‍🍳", "Try buying some actual food first."];
            out.innerHTML = `<div style="color:#999; text-align:center; padding:30px;">${snarky[Math.floor(Math.random()*snarky.length)}</div>`;
            shf.style.display = 'none';
            return;
        }

        const isSpecial = matches[0]?.isSpecial;
        const pickup = isSpecial ? matches : [...matches].sort(() => 0.5 - Math.random()).slice(0, 3);

        out.innerHTML = pickup.map((r, i) => `
            <div class="card ${r.isSpecial ? 'card-lazy' : ''}">
                <span class="name" onclick="copy('${r.name}')">${r.name}</span>
                <div class="tag-group">
                    <span class="tag">${r.time}</span>
                    <span class="tag tag-vibe">${r.vibe}</span>
                </div>
                ${r.isSpecial ? '' : `<a href="https://www.amazon.com/s?k=${r.name}+kit" target="_blank" class="amazon-link">🛒 Shop on Amazon</a>`}
            </div>
        `).join('');
        
        shf.style.display = (!isSpecial && matches.length > 3) ? 'block' : 'none';
    }

    async function copy(t) {
        try {
            await navigator.clipboard.writeText(t);
            const s = document.getElementById('toast');
            s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 1500);
        } catch(e) {}
    }
</script>
</body>
</html>
