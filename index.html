<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo | 在庫から献立検索</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff9e6; display: flex; justify-content: center; padding: 20px; margin: 0; color: #444; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #f39c12; font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
        
        /* 入力エリア */
        .input-box { width: 100%; padding: 15px; border: 2px solid #f39c12; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; outline: none; }
        .example { font-size: 0.75rem; color: #999; margin-bottom: 15px; text-align: left; padding-left: 5px; }

        /* ボタン */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-find { grid-column: span 2; background-color: #f39c12; color: white; margin-bottom: 5px; }
        .btn-find:active { background-color: #e67e22; transform: scale(0.98); }
        .btn-clear { background-color: #ddd; color: #666; }

        /* 結果表示 */
        #result-area { margin-top: 25px; text-align: left; }
        .recipe-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .recipe-name { font-weight: bold; color: #e67e22; display: block; margin-bottom: 5px; }
        .match-tag { font-size: 0.7rem; background: #2ecc71; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .no-result { color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">冷蔵庫にあるものを入力してね</p>

    <input type="text" id="ingredient-input" class="input-box" placeholder="beef, potato, onion...">
    <div class="example">※材料をカンマ（ , ）区切りで入れてね</div>
    
    <div class="btn-group">
        <button class="btn-find" onclick="findRecipes()">何が作れる？</button>
        <button class="btn-clear" onclick="clearAll()">クリア</button>
    </div>

    <div id="result-area"></div>
</div>

<script>
    let menuPool = [];

    // ページが開いた時に menu.json を読み込む
    window.onload = async () => {
        try {
            const response = await fetch('menu.json');
            menuPool = await response.json();
            console.log("Menu pool loaded:", menuPool.length, "items");
        } catch (error) {
            console.error("Menu load failed:", error);
        }
    };

    function clearAll() {
        document.getElementById('ingredient-input').value = '';
        document.getElementById('result-area').innerHTML = '';
    }

    function findRecipes() {
        const input = document.getElementById('ingredient-input').value.toLowerCase();
        const output = document.getElementById('result-area');
        
        if (!input) return;

        // 入力を配列にする (beef, potato -> ["beef", "potato"])
        const myStock = input.split(',').map(item => item.trim()).filter(item => item !== "");
        
        // メニュープールから、持ってる材料で作れるものを探す
        const matches = menuPool.filter(recipe => {
            // レシピに必要な材料が、自分の在庫に全部含まれているかチェック
            return recipe.ingredients.every(needed => myStock.includes(needed));
        });

        // 画面に表示
        if (matches.length > 0) {
            output.innerHTML = matches.map(r => `
                <div class="recipe-card">
                    <span class="recipe-name">🍳 ${r.name} <span class="match-tag">材料バッチリ！</span></span>
                    <small style="color:#aaa">必要：${r.ingredients.join(', ')}</small>
                </div>
            `).join('');
        } else {
            output.innerHTML = '<div class="no-result">うーん、その材料だけだと<br>作れるメニューがまだ登録されてないみたい。</div>';
        }
    }
</script>

</body>
</html>
