<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fridge Combo | Minimalist Idea Generator</title>
    <style>
        /* Base Design */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 380px; min-height: 98vh; display: flex; flex-direction: column; }
        
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 25px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 35px; }
        
        /* Input Area */
        .input-group { position: relative; margin-bottom: 18px; }
        .input-box { width: 100%; padding: 18px 50px 18px 18px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
        .input-box:focus { border-color: #111; }
        
        .btn-clear-inner { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 22px; color: #ccc; cursor: pointer; display: none; padding: 0; }

        .btn-main { width: 100%; padding: 18px; background-color: #111; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 30px; -webkit-appearance: none; }
        .btn-main:active { opacity: 0.8; }

        /* Results */
        #result-area { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #f9f9f9; padding: 22px; border-radius: 14px; border: 1px solid #eee; position: relative; animation: fadeIn 0.4s ease; }
        
        .name { font-size: 1.2rem; font-weight: 700; display: block; margin-bottom: 12px; cursor: pointer; color: #111; letter-spacing: -0.3px; }
        .name:hover { opacity: 0.7; }

        .tag-group { display: flex; gap: 6px; margin-bottom: 18px; }
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; background: #e0e0e0; color: #444; font-weight: 700; text-transform: uppercase; }
        .tag-vibe { background: #111; color: #fff; }

        .amazon-link { font-size: 0.75rem; color: #0066c0; text-decoration: none; font-weight: 500; border-top: 1px solid #eee; padding-top: 15px; width: 100%; display: block; }
        
        #shuffle-btn { background: none; border: none; color: #111; font-size: 0.95rem; cursor: pointer; margin: 35px auto; text-decoration: underline; display: none; width: 100%; text-align: center; font-weight: 700; }
        
        footer { margin-top: 60px; padding: 30px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.75rem; color: #aaa; line-height: 1.8; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.8rem; display: none; z-index: 100; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">Just one (or more) ingredient for tonight's dinner idea.</p>

    <div class="input-group">
        <input type="text" id="ingredient-input" class="input-box" placeholder="beef onion potato" onkeypress="if(event.key==='Enter') findRecipes()" oninput="toggleClearBtn()">
        <button id="clear-btn-inner" class="btn-clear-inner" onclick="clearAll()">✕</button>
    </div>
    
    <button class="btn-main" onclick="findRecipes()">Inspire Me</button>

    <div id="result-area"></div>
    <button id="shuffle-btn" onclick="displayResults()">Next Ideas →</button>

    <footer>
        No login / No tracking / Browser only<br>
        Fridge Combo © 2026
    </footer>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
    let menuPool = [];
    let currentMatches = [];

    window.onload = async () => {
        try {
            const response = await fetch('menu.json');
            menuPool = await response.json();
        } catch (e) { console.error("Menu Pool Error"); }
    };

    function toggleClearBtn() {
        const input = document.getElementById('ingredient-input');
        const clearBtn = document.getElementById('clear-btn-inner');
        clearBtn.style.display = input.value.length > 0 ? 'block' : 'none';
    }

    function clearAll() {
        document.getElementById('ingredient-input').value = '';
        document.getElementById('result-area').innerHTML = '';
        document.getElementById('shuffle-btn').style.display = 'none';
        toggleClearBtn();
    }

    function findRecipes() {
        const inputRaw = document.getElementById('ingredient-input').value.toLowerCase().trim();
        if (!inputRaw) return;

        // 【改良】カンマでもスペースでも区切れるように調整
        // カンマをスペースに変換してから、半角スペースで分割
        const inputKeywords = inputRaw.replace(/,/g, ' ').split(/\s+/).filter(item => item !== "");

        currentMatches = menuPool.filter(recipe => {
            const recipeName = recipe.name.toLowerCase();
            // 名前の中にキーワードが含まれているかチェック
            return inputKeywords.some(keyword => recipeName.includes(keyword));
        });

        displayResults();
    }

    function displayResults() {
        const output = document.getElementById('result-area');
        const shuffleBtn = document.getElementById('shuffle-btn');
        
        if (currentMatches.length === 0) {
            output.innerHTML = '<div style="color:#999; text-align:center; padding:30px;">No ideas found. Try another word.</div>';
            shuffleBtn.style.display = 'none';
            return;
        }

        const shuffled = [...currentMatches].sort(() => 0.5 - Math.random());
        const pickup = shuffled.slice(0, 3);

        output.innerHTML = pickup.map(r => `
            <div class="card">
                <span class="name" onclick="copyToClipboard('${r.name}')">${r.name}</span>
                <div class="tag-group">
                    <span class="tag">${r.time}</span>
                    <span class="tag tag-vibe">${r.vibe}</span>
                </div>
                <a href="https://www.amazon.com/s?k=${r.name}+kit" target="_blank" class="amazon-link">🛒 Shop on Amazon</a>
            </div>
        `).join('');
        
        shuffleBtn.style.display = currentMatches.length > 3 ? 'block' : 'none';
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        } catch (err) {}
    }
</script>

</body>
</html>
