<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fridge Combo</title>
    <style>
        /* Base Design */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; }
        .container { width: 100%; max-width: 380px; min-height: 95vh; display: flex; flex-direction: column; }
        
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin: 20px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 30px; }
        
        /* Input Area */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 16px 45px 16px 16px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
        .input-box:focus { border-color: #111; }
        
        .btn-clear { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; color: #ccc; cursor: pointer; display: none; padding: 5px; }

        .btn-main { width: 100%; padding: 16px; background-color: #111; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 25px; -webkit-appearance: none; }
        .btn-main:active { opacity: 0.8; }

        /* Result Cards */
        #result-area { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #f9f9f9; padding: 20px; border-radius: 14px; border: 1px solid #eee; animation: fadeIn 0.3s ease; }
        
        .name { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; display: block; cursor: pointer; color: #111; }
        .name:hover { opacity: 0.7; }

        .tags { display: flex; gap: 6px; margin-bottom: 15px; }
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; background: #e0e0e0; color: #444; font-weight: 700; text-transform: uppercase; }
        .tag-vibe { background: #111; color: #fff; }

        .amazon { font-size: 0.75rem; color: #0066c0; text-decoration: none; font-weight: 500; display: inline-block; border-top: 1px solid #eee; width: 100%; pt: 12px; margin-top: 5px; padding-top: 10px; }

        #shuffle { background: none; border: none; text-decoration: underline; font-size: 0.9rem; cursor: pointer; display: none; margin: 30px auto; font-weight: 700; color: #111; }

        /* Footer & UI */
        footer { margin-top: 50px; padding: 25px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.7rem; color: #aaa; line-height: 1.8; letter-spacing: 0.5px; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 22px; border-radius: 25px; font-size: 0.8rem; display: none; z-index: 100; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Fridge Combo</h1>
    <p class="subtitle">Just one ingredient for a dinner idea.</p>

    <div class="input-group">
        <input type="text" id="in" class="input-box" placeholder="e.g. beef" oninput="toggleCl()" onkeypress="if(event.key==='Enter') find()">
        <button id="cl" class="btn-clear" onclick="clearIn()">✕</button>
    </div>
    
    <button class="btn-main" onclick="find()">Inspire Me</button>

    <div id="result-area"></div>
    <button id="shuffle" onclick="show()">Next Ideas →</button>

    <footer>
        No login / No tracking / Browser only<br>
        Fridge Combo © 2026
    </footer>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
    let pool = [], matches = [];

    // JSON読み込み
    window.onload = async () => {
        try {
            const res = await fetch('menu.json');
            pool = await res.json();
        } catch(e) {
            console.error("Menu failed to load");
        }
    };

    function toggleCl() {
        const val = document.getElementById('in').value;
        document.getElementById('cl').style.display = val ? 'block' : 'none';
    }

    function clearIn() {
        document.getElementById('in').value = '';
        document.getElementById('result-area').innerHTML = '';
        document.getElementById('shuffle').style.display = 'none';
        toggleCl();
    }

    function find() {
        const val = document.getElementById('in').value.toLowerCase().trim();
        if(!val) return;
        // 名前(name)から検索
        matches = pool.filter(r => r.name.toLowerCase().includes(val));
        show();
    }

    function show() {
        const out = document.getElementById('result-area');
        const shf = document.getElementById('shuffle');
        
        if(matches.length === 0) {
            out.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">No ideas found for that.</p>';
            shf.style.display = 'none';
            return;
        }

        const res = [...matches].sort(() => 0.5 - Math.random()).slice(0, 3);
        out.innerHTML = res.map(r => `
            <div class="card">
                <span class="name" onclick="copy('${r.name}')">${r.name}</span>
                <div class="tags">
                    <span class="tag">${r.time}</span>
                    <span class="tag tag-vibe">${r.vibe}</span>
                </div>
                <a href="https://www.amazon.com/s?k=${r.name}+kit" target="_blank" class="amazon">🛒 Shop on Amazon</a>
            </div>
        `).join('');
        
        shf.style.display = matches.length > 3 ? 'block' : 'none';
    }

    async function copy(t) {
        try {
            await navigator.clipboard.writeText(t);
            const s = document.getElementById('toast');
            s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 1500);
        } catch(e) {}
    }
</script>

</body>
</html>
