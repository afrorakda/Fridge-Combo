<style>
    /* 修正点1: font-size: 16px を追加してiPhoneの自動拡大を防ぐ */
    input { 
        width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; 
        box-sizing: border-box; font-size: 16px; 
    }
    
    /* 修正点2: ボタンを上下配置にし、Findを大きく目立たせる */
    .button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .btn-find { padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
    .btn-clear { padding: 12px; background: transparent; color: #5f6368; border: 1px solid #e8eaed; border-radius: 8px; font-size: 14px; }
</style>

<div class="button-group">
    <button class="btn-find" onclick="findRecipes()">Find Ideas</button>
    <button class="btn-clear" onclick="clearAll()">Clear Input</button>
</div>
