<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo - Smart Cooking</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .result-box { margin-top: 20px; padding: 15px; background: #f0f4f8; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <h1>Fridge Combo</h1>
    <p>Enter ingredients (e.g., Beef, Onion):</p>
    
    <input type="text" id="ingredients" placeholder="Beef, Onion, Tomato...">
    <button onclick="findRecipes()">Find Recipes</button>

    <div id="result" class="result-box">
        <h3 id="r-name"></h3>
        <p id="r-desc"></p>
        <a href="#" id="affiliate-link">Get tools here</a>
    </div>

    <script>
        const recipes = [
            { name: "Steak & Onions", needs: ["Beef", "Onion"], plus: "Black Pepper" },
            { name: "Herb Poached Chicken", needs: ["Chicken", "Thyme"], plus: "Olive Oil" }
        ];

        function findRecipes() {
            const input = document.getElementById('ingredients').value.toLowerCase();
            const resultDiv = document.getElementById('result');
            
            // 入力された文字を配列に変換
            const inputArr = input.split(',').map(item => item.trim());
            
            // どれか1つでも材料が一致するレシピを探す
            const match = recipes.find(r => r.needs.some(n => input.includes(n.toLowerCase())));

            if (match) {
                document.getElementById('r-name').innerText = "Try: " + match.name;
                document.getElementById('r-desc').innerText = "Add [" + match.plus + "] for extra flavor!";
                resultDiv.style.display = 'block';
            } else {
                alert("No recipes found! Try other ingredients.");
            }
        }
    </script>
</body>
</html>
