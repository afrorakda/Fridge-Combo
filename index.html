<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Combo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* Fridge Combo UI Standard: Minimalist, White BG, Black Button, 15px Rounded */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        /* Add to Home Banner */
        #pwa-banner {
            display: none;
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        #result {
            margin-top: 30px;
            white-space: pre-wrap;
        }

        /* Footer Section: Ko-fi & Privacy Policy */
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            text-align: center;
        }

        .kofi-button {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .footer-text {
            font-size: 11px;
            color: #999;
            margin: 5px 0;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <div id="pwa-banner">
        📱 Add to Home Screen for better experience!
    </div>

    <h1>Fridge Combo</h1>

    <div class="input-group">
        <label>Ingredients (comma separated)</label>
        <input type="text" id="ingredients" placeholder="Tomato, Egg, Onion...">
    </div>

    <button onclick="findRecipe()">Find Recipe</button>

    <div id="result"></div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-button">
            ☕ Support me on Ko-fi
        </a>
        <p class="footer-text">No login / No tracking / No ads / Browser only Privacy Policy</p>
        <p class="footer-text">Fridge Combo © 2026</p>
    </footer>

    <script>
        // PWA Install Prompt Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-banner').style.display = 'block';
        });

        document.getElementById('pwa-banner').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-banner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        function findRecipe() {
            const ingredients = document.getElementById('ingredients').value;
            const resultDiv = document.getElementById('result');
            
            if (!ingredients) {
                resultDiv.innerText = "Please enter some ingredients.";
                return;
            }

            const query = encodeURIComponent(ingredients + " recipes");
            const searchUrl = `https://www.google.com/search?q=${query}`;
            
            resultDiv.innerHTML = `Searching for: <strong>${ingredients}</strong>...<br><br>` +
                                `<button onclick="window.open('${searchUrl}', '_blank')" style="background:#555; padding:10px; font-size:14px;">Open Results</button>`;
        }
    </script>
</body>
</html>
